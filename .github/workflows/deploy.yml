name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: production/skillforgeai
          IMAGE_TAG: ${{ github.sha }}

        run: |
          cd Backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        env:
          IMAGE_TAG: ${{ github.sha }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG
          timeout: 60s
          command_timeout: 20m
          script_stop: true

          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              723468358503.dkr.ecr.ap-south-1.amazonaws.com

            # Stop old container FIRST to free up RAM
            docker rm -f skillforge-app || true

            # Free up maximum disk space before downloading
            docker system prune -af

            # Pull new image
            docker pull 723468358503.dkr.ecr.ap-south-1.amazonaws.com/production/skillforgeai:$IMAGE_TAG

            # Start new container
            docker run -d \
              --name skillforge-app \
              -p 3005:3005 \
              --env-file /home/ubuntu/.env \
              --restart unless-stopped \
              723468358503.dkr.ecr.ap-south-1.amazonaws.com/production/skillforgeai:$IMAGE_TAG

            # Wait and verify it started
            sleep 5
            docker ps | grep skillforge-app

            echo "✅ Deployment complete!"